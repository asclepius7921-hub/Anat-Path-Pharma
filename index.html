<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Anat Path Pharma</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0f;
  color: #e8e8f0;
  font-family: sans-serif;
  min-height: 100vh;
  padding: 40px 20px;
}
h1 { text-align: center; font-size: 28px; margin-bottom: 8px; }
h1 .a { color: #7c6af7; }
h1 .p { color: #f76a8a; }
h1 .ph { color: #6af7c4; }
p { text-align: center; color: #6b6b8a; font-size: 12px; margin-bottom: 32px; letter-spacing: 2px; }

#home { display: block; }
#study { display: none; padding: 20px; }

.card {
  display: block;
  width: 100%;
  background: #12121a;
  border: 1px solid #2a2a3d;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
  color: #e8e8f0;
  font-size: 16px;
  text-align: left;
  cursor: pointer;
  font-family: sans-serif;
}
.card:active { opacity: 0.7; }

.back {
  display: block;
  width: 100%;
  background: #7c6af7;
  border: none;
  border-radius: 12px;
  padding: 14px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin-top: 20px;
  font-family: sans-serif;
}
</style>
</head>
<body>

<div id="home">
  <h1><span class="a">Anat</span> <span class="p">Path</span> <span class="ph">Pharma</span></h1>
  <p>NEET-PG · FMGE · FLASHCARDS</p>

  <button class="card" onclick="go('anatomy')">
    🦴 <strong>Anatomy</strong><br>
    <small style="color:#6b6b8a">285 cards · 155 PYQ</small>
  </button>

  <button class="card" onclick="go('pathology')">
    🔬 <strong>Pathology</strong><br>
    <small style="color:#6b6b8a">208 cards · 94 PYQ</small>
  </button>

  <button class="card" onclick="go('pharmacology')">
    💊 <strong>Pharmacology</strong><br>
    <small style="color:#6b6b8a">262 cards · 79 PYQ</small>
  </button>

  <p style="margin-top:20px">@shivansh_studies</p>
</div>

<div id="study">
  <h2 id="studyTitle" style="margin-bottom:20px">Subject</h2>
  <p id="studyMsg" style="color:#6af7c4;text-align:left;letter-spacing:0;font-size:16px">
    ✅ Touch is working! The full app will load here.
  </p>
  <button class="back" onclick="goHome()">← Back</button>
</div>

<script>
function go(subject) {
  document.getElementById('home').style.display = 'none';
  document.getElementById('study').style.display = 'block';
  document.getElementById('studyTitle').textContent = subject.charAt(0).toUpperCase() + subject.slice(1);
}
function goHome() {
  document.getElementById('study').style.display = 'none';
  document.getElementById('home').style.display = 'block';
}
</script>
</body>
</html>
